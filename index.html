<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Lander Controle</title>
<style>
:root{--blue:#0788ff;--green:#00d96b;--purple:#8247ff;--silver:#b9c2cf}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{background:#000 url("lander-bg.jpeg") center top/100% auto no-repeat}
.hero{height:353px;position:relative}
.menu,.bell{position:absolute;top:36px;width:66px;height:66px;border:1px solid #25384c;border-radius:16px;background:rgba(2,8,14,.88);display:grid;place-items:center;box-shadow:0 6px 20px #000b}
.menu{left:31px}.bell{right:31px}.menu svg,.bell svg{width:31px;height:31px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.bell:after{content:"";position:absolute;right:13px;top:13px;width:9px;height:9px;background:var(--blue);border-radius:50%}
main{width:100%;max-width:710px;margin:auto;padding:0 31px 143px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px 17px}
.card{height:181px;position:relative;border:1px solid #30475e;border-radius:20px;background:linear-gradient(145deg,rgba(3,13,22,.97),rgba(1,7,12,.93));box-shadow:0 7px 20px #000b;padding:28px 8px 15px 104px;overflow:hidden}
.card-icon{position:absolute;left:20px;top:31px;width:72px;height:72px;border:2px solid var(--blue);border-radius:50%;display:grid;place-items:center;box-shadow:0 0 10px rgba(7,136,255,.28)}
.card-icon svg{width:43px;height:43px;fill:none;stroke:var(--blue);stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.card small{display:block;color:#bec5cf;font-size:13px;font-weight:650;text-transform:uppercase;white-space:nowrap;line-height:1.1;margin-top:7px;letter-spacing:-.45px;width:100%;max-width:none;overflow:visible;text-overflow:unset}
.money{font-size:29px;font-weight:850;margin-top:13px;white-space:nowrap;letter-spacing:-.6px}
.spark{position:absolute;left:20px;right:20px;bottom:18px;height:42px}
.spark svg{width:100%;height:100%;overflow:visible}.spark polyline{fill:none;stroke:var(--blue);stroke-width:1.8;filter:drop-shadow(0 0 3px var(--blue))}
.card.green .card-icon{border-color:var(--green);box-shadow:0 0 10px rgba(0,217,107,.34)}.card.green .card-icon svg{stroke:var(--green)}.card.green .spark polyline{stroke:var(--green);filter:drop-shadow(0 0 3px var(--green))}
.card.purple .card-icon{border-color:var(--purple);box-shadow:0 0 10px rgba(130,71,255,.38)}.card.purple .card-icon svg{stroke:var(--purple)}.card.purple .spark polyline{stroke:var(--purple);filter:drop-shadow(0 0 3px var(--purple))}
.quick{margin-top:95px}.quick h2{font-size:24px;margin:0 0 20px;text-transform:uppercase}.quick h2:before{content:"◢";color:var(--blue);font-size:21px;margin-right:9px}
.action{width:100%;height:108px;margin:0 0 15px;position:relative;display:flex;align-items:center;padding:0 65px 0 125px;border:1px solid #126bb8;border-radius:18px;background:linear-gradient(145deg,rgba(2,12,21,.98),rgba(1,7,12,.95));color:#fff;text-align:left;box-shadow:0 7px 20px #000a}
.plus{position:absolute;left:27px;top:19px;width:68px;height:68px;border:2px solid var(--blue);border-radius:50%;display:grid;place-items:center;color:var(--blue);font-size:43px;font-weight:300;box-shadow:0 0 10px rgba(7,136,255,.25)}
.copy{display:flex;flex-direction:column;gap:10px;font-size:20px;font-weight:800;line-height:1}.copy small{font-size:14px;font-weight:450;color:#aeb8c6}.chev{position:absolute;right:31px;top:50%;transform:translateY(-54%);font-size:55px;font-weight:250;color:#aeb8c6}
.view{display:none}.view.active{display:block}
.list-title{margin:28px 0 14px;font-size:24px}.row{display:flex;align-items:center;justify-content:space-between;background:rgba(2,10,18,.94);border:1px solid #315f85;padding:18px;border-radius:18px;margin:10px 0;gap:10px}.row b{display:block}.row small{color:#aeb8c6}.right{text-align:right}.pill{font-size:11px;padding:5px 8px;border-radius:999px;background:#17314e;color:#a9d4ff}
input,select{width:100%;background:#06111d;border:1px solid #29445f;color:white;border-radius:12px;padding:13px;margin:5px 0 10px;font-size:16px}label{font-size:12px;color:#aeb8c6}
dialog{width:min(92%,520px);border:1px solid #2b6ca5;border-radius:20px;background:#07111f;color:white;padding:18px}dialog::backdrop{background:#000b}.actions{display:flex;gap:8px;margin-top:8px}.actions button{flex:1;padding:12px;border:0;border-radius:11px;font-weight:800}.secondary{background:#26384b;color:white}.save{background:var(--blue);color:#fff}
nav{position:fixed;left:22px;right:22px;bottom:14px;z-index:20;height:116px;display:grid;grid-template-columns:repeat(5,1fr);padding:17px 5px calc(10px + env(safe-area-inset-bottom));background:rgba(2,9,16,.97);border:1px solid #405367;border-radius:29px;box-shadow:0 12px 34px #000}
nav button{background:none;border:0;color:#9da8b7;font-size:12px;padding:3px 1px}.nav-icon{display:block;width:32px;height:32px;margin:0 auto 8px}.nav-icon svg{width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.product-add{height:92px;margin-bottom:16px}.product-add .plus{width:56px;height:56px;top:17px;font-size:36px}.product-add .copy{font-size:17px}
.product-right{text-align:right;min-width:92px}.product-actions{display:flex;justify-content:flex-end;gap:7px;margin-top:8px}.product-actions button{width:34px;height:30px;border:1px solid #315f85;border-radius:9px;background:#071522;color:#9dcbff;font-size:18px}
nav button.active{color:var(--blue);font-weight:800}nav button.active.home .nav-icon svg{fill:var(--blue);stroke:var(--blue)}
@media(max-width:430px){
.hero{height:353px}main{padding-left:18px;padding-right:18px}.menu{left:18px}.bell{right:18px}
.grid{gap:10px}.card{height:181px;padding:27px 5px 15px 86px;border-radius:19px}.card-icon{left:16px;top:31px;width:64px;height:64px}.card-icon svg{width:39px;height:39px}.card small{font-size:9.7px;letter-spacing:-.55px}.money{font-size:24px;margin-top:12px}.spark{left:16px;right:16px}
.quick{margin-top:88px}.quick h2{font-size:21px}.action{height:108px;padding-left:105px;padding-right:50px}.plus{left:20px;width:64px;height:64px;top:21px}.copy{font-size:16px}.copy small{font-size:12px}.chev{right:22px}nav{left:14px;right:14px;height:112px}
}

.card:nth-child(1) small{font-size:12px}
.card:nth-child(2) small{font-size:11.2px}
.card:nth-child(3) small{font-size:10.8px}
.card:nth-child(4) small{font-size:11.7px}
.card:nth-child(5) small{font-size:12px}
@media(max-width:430px){
.card:nth-child(1) small{font-size:9.2px}
.card:nth-child(2) small{font-size:8.5px}
.card:nth-child(3) small{font-size:8.15px}
.card:nth-child(4) small{font-size:8.8px}
.card:nth-child(5) small{font-size:9.3px}
}


/* V4 — geometria travada na referência 710 × 1536 */
@media (min-width:431px){
  main{width:710px;max-width:710px;padding-left:31px;padding-right:31px}
  .hero{width:710px;height:353px;margin:0 auto}
  .grid{grid-template-columns:315px 315px;column-gap:17px;row-gap:15px}
  .card{width:315px;height:181px;border-radius:20px;padding:28px 8px 15px 111px}
  .card-icon{left:20px;top:31px;width:72px;height:72px}
  .card-icon svg{width:43px;height:43px}
  .card small{font-size:15px;letter-spacing:-.35px}
  .card:nth-child(1) small{font-size:15px}
  .card:nth-child(2) small{font-size:14.3px}
  .card:nth-child(3) small{font-size:13.2px}
  .card:nth-child(4) small{font-size:14.6px}
  .card:nth-child(5) small{font-size:15px}
  .money{font-size:29px;margin-top:13px}
  .spark{left:20px;right:20px;bottom:18px;height:42px}
  .quick{margin-top:95px}
  .quick h2{font-size:24px;margin-bottom:20px}
  .action{width:648px;height:108px;border-radius:18px;margin-bottom:15px;padding-left:125px;padding-right:65px}
  .plus{left:27px;top:19px;width:68px;height:68px}
  .copy{font-size:20px}.copy small{font-size:14px}
  nav{width:666px;left:50%;right:auto;transform:translateX(-50%);height:116px;bottom:14px;border-radius:29px}
}
@media (max-width:430px){
  body{background-size:100% auto;background-position:center top}
  .hero{height:214px}
  main{padding:0 15px 126px}
  .grid{grid-template-columns:calc((100vw - 40px)/2) calc((100vw - 40px)/2);gap:9px 10px}
  .card{width:calc((100vw - 40px)/2);height:111px;border-radius:13px;padding:17px 4px 9px 70px}
  .card-icon{left:12px;top:19px;width:45px;height:45px}
  .card-icon svg{width:27px;height:27px}
  .card small{margin-top:4px;line-height:1.05;letter-spacing:-.35px}
  .card:nth-child(1) small{font-size:8.6px}
  .card:nth-child(2) small{font-size:8.1px}
  .card:nth-child(3) small{font-size:7.5px}
  .card:nth-child(4) small{font-size:8.2px}
  .card:nth-child(5) small{font-size:8.7px}
  .money{font-size:16.5px;margin-top:8px;letter-spacing:-.35px}
  .spark{left:12px;right:12px;bottom:10px;height:26px}
  .quick{margin-top:57px}
  .quick h2{font-size:15px;margin-bottom:12px}
  .quick h2:before{font-size:13px;margin-right:6px}
  .action{height:66px;border-radius:12px;margin-bottom:10px;padding:0 42px 0 77px}
  .plus{left:17px;top:12px;width:42px;height:42px;font-size:28px}
  .copy{font-size:12.5px;gap:6px}.copy small{font-size:8.5px}
  .chev{right:19px;font-size:35px}
  nav{left:14px;right:14px;bottom:9px;height:76px;border-radius:19px;padding:10px 3px calc(6px + env(safe-area-inset-bottom))}
  nav button{font-size:8px}
  .nav-icon{width:21px;height:21px;margin-bottom:5px}
}


/* V6 — fundo fixo e correções da aba Peças */
body{background:none!important;position:relative}
body::before{
  content:"";position:fixed;inset:0;z-index:-2;
  background:#000 url("lander-bg.jpeg") center top/cover no-repeat;
  transform:translateZ(0);pointer-events:none;
}
body::after{
  content:"";position:fixed;inset:0;z-index:-1;
  background:rgba(0,0,0,.08);pointer-events:none;
}
#pecas .product-add .plus{
  position:absolute!important;
  left:18px!important;top:50%!important;
  transform:translateY(-50%)!important;
  width:54px!important;height:54px!important;
  min-width:54px!important;min-height:54px!important;
  border-radius:50%!important;
  display:flex!important;align-items:center!important;justify-content:center!important;
  font-size:35px!important;line-height:1!important;
  box-sizing:border-box!important;
}
#pecas .product-add{
  position:relative!important;
  overflow:hidden!important;
  padding-left:92px!important;
}
#pecas .product-add .copy{position:relative!important;z-index:1}
#pecas .product-add .chev{position:absolute!important;right:22px!important}
@media(max-width:430px){
  body::before{background-size:cover;background-position:center top}
  #pecas .product-add .plus{
    left:15px!important;width:46px!important;height:46px!important;
    min-width:46px!important;min-height:46px!important;font-size:30px!important;
  }
  #pecas .product-add{padding-left:76px!important}
}


/* V7 — gestão, pendências, OS e edição */
.menu,.bell,.card{cursor:pointer}
.quick-head{display:flex;align-items:center;justify-content:space-between}
.quick-head h2{margin-bottom:20px}
.quick-toggle{border:1px solid #315f85;background:rgba(2,10,18,.92);color:#9dcbff;border-radius:10px;width:38px;height:34px;font-size:20px}
.quick.collapsed .quick-actions{display:none}.quick.collapsed{margin-bottom:0}
.drawer{position:fixed;inset:0;z-index:60;background:#0009;display:none}.drawer.open{display:block}
.drawer-panel{width:min(86vw,390px);height:100%;background:#050d17;border-right:1px solid #315f85;padding:calc(28px + env(safe-area-inset-top)) 18px 30px;overflow:auto}
.drawer-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.drawer-head h2{margin:0}.drawer-close{background:none;border:0;color:#fff;font-size:30px}
.drawer-item{width:100%;display:flex;justify-content:space-between;align-items:center;padding:17px 14px;margin:8px 0;border:1px solid #284b6a;border-radius:14px;background:#071522;color:#fff;text-align:left;font-size:15px}
.notice-panel{position:fixed;top:95px;right:18px;z-index:65;width:min(91vw,420px);max-height:70vh;overflow:auto;background:#050d17;border:1px solid #315f85;border-radius:18px;padding:15px;display:none;box-shadow:0 15px 40px #000}.notice-panel.open{display:block}.notice-panel h2{margin:0 0 10px}.notice{padding:13px;border-bottom:1px solid #1d354c}.notice:last-child{border-bottom:0}.notice small{display:block;color:#aeb8c6;margin-top:4px}
.section-tools{display:flex;gap:8px;margin-bottom:10px}.section-tools button,.mini-btn{border:1px solid #315f85;background:#071522;color:#9dcbff;border-radius:10px;padding:10px 12px}
.edit-value{border:1px solid #315f85;background:#071522;color:#9dcbff;border-radius:9px;padding:7px 9px;margin-left:8px}
.os-card{background:rgba(2,10,18,.95);border:1px solid #315f85;border-radius:18px;padding:16px;margin:10px 0}.os-card h3{margin:0 0 7px}.os-meta{color:#aeb8c6;font-size:13px;line-height:1.5}.os-total{font-size:19px;font-weight:800;margin-top:10px}.os-actions{display:flex;gap:8px;margin-top:12px}.os-actions button{flex:1;border:1px solid #315f85;background:#071522;color:#9dcbff;border-radius:10px;padding:10px}
.part-results{max-height:180px;overflow:auto;border:1px solid #29445f;border-radius:12px;margin-bottom:10px}.part-option{padding:11px;border-bottom:1px solid #1d354c;display:flex;justify-content:space-between}.part-option:last-child{border-bottom:0}.part-option button{background:#0b79db;border:0;color:white;border-radius:8px;padding:6px 9px}.selected-part{display:flex;justify-content:space-between;gap:8px;padding:8px 0;color:#c7d1dd}.selected-part button{background:none;border:0;color:#ff8d8d}
nav{grid-template-columns:repeat(6,1fr)}
@media(max-width:430px){nav button{font-size:7px}.nav-icon{width:19px;height:19px}.drawer-panel{width:88vw}.notice-panel{top:82px;right:12px}}


/* V8 — OS profissional */
.inline-field{display:grid;grid-template-columns:1fr 54px;gap:8px;align-items:end}
.camera-btn{height:48px;border:1px solid #168cff;background:#061522;color:#168cff;border-radius:12px;font-size:24px}
.photo-box{border:1px dashed #315f85;border-radius:14px;padding:12px;margin:8px 0}.photo-preview{width:100%;max-height:240px;object-fit:contain;border-radius:10px;display:none;margin-top:10px}
.photo-actions{display:flex;gap:8px}.photo-actions button{flex:1;border:1px solid #315f85;background:#071522;color:#9dcbff;border-radius:10px;padding:11px}
.signature-wrap{border:1px solid #315f85;border-radius:14px;background:#fff;margin:8px 0;overflow:hidden}.signature-wrap canvas{display:block;width:100%;height:180px;touch-action:none}
.signature-tools{display:flex;justify-content:flex-end;margin:6px 0}.signature-tools button{border:1px solid #315f85;background:#071522;color:#9dcbff;border-radius:9px;padding:8px 12px}
.pay-block{display:none}.pay-block.show{display:block}
.ocr-status{font-size:12px;color:#9dcbff;margin:5px 0}


/* V9 */
.cost-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.profit-box{border:1px solid #16d979;border-radius:12px;padding:12px;color:#16d979;margin:10px 0;font-weight:800}
.logo-pdf-note{font-size:12px;color:#93a8bf}.warranty-box{border:1px solid #315f85;border-radius:12px;padding:10px;margin:8px 0}
</style>

</head>
<body>
<div class="hero">
<div class="menu" onclick="toggleMenu()"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></div>
<div class="bell" onclick="toggleNotices()"><svg viewBox="0 0 24 24"><path d="M6 9a6 6 0 0 1 12 0v5l2 3H4l2-3z"/><path d="M10 20h4"/></svg></div>
</div>
<main>
<section id="inicio" class="view active">
<div class="grid">
<div class="card" onclick="goView('gastos')"><span class="card-icon"><svg viewBox="0 0 24 24"><path d="M2.5 4h2.5l2.2 10.2h10.2l2.2-7.2H6"/><path d="M8 10h10M10 7v7M15 7v7"/><circle cx="9" cy="18.5" r="1.5"/><circle cx="17" cy="18.5" r="1.5"/></svg></span><small>Gastos da loja</small><div class="money" id="gastosTotal"></div><div class="spark"><svg viewBox="0 0 280 42"><polyline points="0,34 27,27 51,31 77,15 102,27 130,22 157,31 187,20 214,23 243,13 280,9"/></svg></div></div>
<div class="card" onclick="goView('credito')"><span class="card-icon"><svg viewBox="0 0 24 24"><path d="M12 2v10M15 5c0-1.5-1.4-2.5-3-2.5S9 3.5 9 5s1.4 2.3 3 2.3 3 .9 3 2.4-1.4 2.4-3 2.4"/><path d="M3 16h4l2-2h5.5c1.3 0 2.2.8 2.2 1.9 0 .6-.3 1.1-.8 1.5H12"/><path d="M3 16v5h4l3-1h6l5-4c.8-.6.8-1.7.2-2.3-.5-.5-1.4-.6-2-.2l-3.2 2"/></svg></span><small>Crediário a receber</small><div class="money" id="crediarioTotal"></div><div class="spark"><svg viewBox="0 0 280 42"><polyline points="0,34 27,27 51,31 77,15 102,27 130,22 157,31 187,20 214,23 243,13 280,9"/></svg></div></div>
<div class="card" onclick="goView('socios')"><span class="card-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M4 22c0-5.2 3-8.2 8-8.2s8 3 8 8.2"/></svg></span><small>Dívida pessoal à loja</small><div class="money" id="dividaTotal"></div><div class="spark"><svg viewBox="0 0 280 42"><polyline points="0,34 27,27 51,31 77,15 102,27 130,22 157,31 187,20 214,23 243,13 280,9"/></svg></div></div>
<div class="card green" onclick="goView('socios')"><span class="card-icon"><svg viewBox="0 0 24 24"><path d="M4 20v-5h4v5M10 20v-8h4v8M16 20V8h4v12"/><path d="M3 11l6-5 4 3 8-7"/><path d="M17 2h4v4"/></svg></span><small>Lucro Anderson</small><div class="money" id="lucroA"></div><div class="spark"><svg viewBox="0 0 280 42"><polyline points="0,34 27,27 51,31 77,15 102,27 130,22 157,31 187,20 214,23 243,13 280,9"/></svg></div></div>
<div class="card purple" onclick="goView('socios')"><span class="card-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M4 22c0-5.2 3-8.2 8-8.2s8 3 8 8.2"/></svg></span><small>Lucro Ryan</small><div class="money" id="lucroR"></div><div class="spark"><svg viewBox="0 0 280 42"><polyline points="0,34 27,27 51,31 77,15 102,27 130,22 157,31 187,20 214,23 243,13 280,9"/></svg></div></div>
</div>
<div class="quick" id="quick"><div class="quick-head"><h2>Ações rápidas</h2><button class="quick-toggle" onclick="toggleQuick()">⌃</button></div><div class="quick-actions">
<button class="action" onclick="openModal('gasto')"><span class="plus">＋</span><span class="copy">NOVO GASTO<small>Registrar uma nova despesa</small></span><span class="chev">›</span></button>
<button class="action" onclick="openModal('servico')"><span class="plus">＋</span><span class="copy">NOVO SERVIÇO OU PRODUTO<small>Adicionar serviço ou produto</small></span><span class="chev">›</span></button>
</div></div>
</section>
<section id="gastos" class="view"><h2 class="list-title">Gastos da loja</h2><div class="section-tools"><button onclick="openModal('gasto')">＋ Novo gasto</button></div><div id="gastosList"></div></section>
<section id="credito" class="view"><h2 class="list-title">Crediário em aberto</h2><div id="creditoList"></div></section>
<section id="pecas" class="view">
<h2 class="list-title">Peças e telas</h2>
<button class="action product-add" onclick="openProductModal()"><span class="plus">＋</span><span class="copy">ADICIONAR PRODUTO<small>Cadastrar uma nova peça ou tela</small></span><span class="chev">›</span></button>
<input id="busca" placeholder="Buscar modelo, categoria ou tela..." oninput="renderPecas()">
<div id="pecasList"></div>
</section>
<section id="socios" class="view"><h2 class="list-title">Sócios</h2><div id="sociosList"></div></section>
<section id="os" class="view"><h2 class="list-title">Ordens de Serviço</h2><div class="section-tools"><button onclick="openOS()">＋ Nova OS</button></div><div id="osList"></div></section>

function saveEntry(e){e.preventDefault();if(!form.reportValidity())return;if(mode==="gasto"){db.gastos.push({nome:f1.value.trim(),valor:+f2.value,status:f3.value,tipo:"Loja"});modal.close();persist(`Novo gasto: ${f1.value.trim()}`)}else{db.movimentos.push({nome:f1.value.trim(),tipo:ftipo.value,custo:+f2.value,valor:+f3.value});modal.close();persist(`Novo ${ftipo.options[ftipo.selectedIndex].text.toLowerCase()}: ${f1.value.trim()}`)}}

function renderNotices(){if(!document.getElementById("noticeList"))return;let n=[];db.credito.filter(x=>x.total>x.pago).forEach(x=>n.push(`<div class="notice"><b>${esc(x.cliente)} — ${money(x.total-x.pago)} a receber</b><small>${esc(x.item)} • ${esc(x.acordo)}</small></div>`));db.gastos.filter(x=>x.status==="Pendente").forEach(x=>n.push(`<div class="notice"><b>${esc(x.nome)} — ${money(x.valor)}</b><small>Gasto pendente • ${esc(x.tipo||"Loja")}</small></div>`));db.os.filter(x=>!["Entregue"].includes(x.status)).forEach(x=>n.push(`<div class="notice"><b>OS ${esc(x.aparelho)} — ${esc(x.status)}</b><small>${esc(x.cliente)} • ${esc(x.servico)}</small></div>`));noticeList.innerHTML=n.join("")||'<div class="notice">Nenhuma pendência no momento.</div>';document.querySelector(".bell").classList.toggle("has-notice",n.length>0)}

let editingOS=null,osParts=[];
function openOS(i=null){editingOS=i;osParts=[];osForm.reset();osMaoObra.value=0;devicePhotoPreview.style.display="none";devicePhotoPreview.removeAttribute("src");ocrStatus.textContent="";osModalTitle.textContent=i===null?"Nova ordem de serviço":"Editar ordem de serviço";if(i!==null){let x=db.os[i];osCliente.value=x.cliente;osCpf.value=x.cpf||"";osTelefone.value=x.telefone||"";osRua.value=x.rua||"";osBairro.value=x.bairro||"";osAparelho.value=x.aparelho;osSerial.value=x.serial||"";osDefeito.value=x.defeito;osServico.value=x.servico;osMaoObra.value=x.maoObra||0;osGarantia.value=x.garantia||"Sem garantia";osStatus.value=x.status;osPagamento.value=x.pagamento||"Dinheiro";osParts=(x.pecas||[]).map(y=>({...y}));if(x.foto){devicePhotoPreview.src=x.foto;devicePhotoPreview.style.display="block"}}renderSelectedParts();osPartResults.innerHTML="";togglePayment();osModal.showModal();setTimeout(()=>{initSignature();if(i!==null&&db.os[i].assinatura)loadSignature(db.os[i].assinatura)},120)}
function searchOSParts(){let q=osPartSearch.value.toLowerCase().trim();if(!q){osPartResults.innerHTML="";return}let arr=db.pecas.map((x,i)=>({...x,_i:i})).filter(x=>(x.nome+" "+x.cat).toLowerCase().includes(q)).slice(0,12);osPartResults.innerHTML=arr.map(x=>`<div class="part-option"><span>${esc(x.nome)} • ${money(x.valor)}</span><button type="button" onclick="addOSPart(${x._i})">Adicionar</button></div>`).join("")||'<div class="part-option">Nenhuma peça encontrada</div>'}

async function finishOS(i){let x=db.os[i];if(!["Pronto","Entregue"].includes(x.status))return alert('Coloque a OS como "Pronto" para finalizar.');if(!x.pagamento)return alert("Selecione a forma de pagamento.");if(!x.lancada){let custo=(x.pecas||[]).reduce((a,p)=>a+Number(p.custo||0),0),valor=Number(x.maoObra||0);if(valor<=0)return alert("Informe o valor cobrado na OS antes de concluir.");db.movimentos.push({nome:`OS - ${x.aparelho} - ${x.servico}`,tipo:"reparo",custo,valor});x.lancada=true;x.status="Entregue";persist(`OS concluída e lucro lançado: ${x.cliente} — ${x.aparelho}`)}await generateAndSharePDF(i)}

async function finalizeCredit(i){let x=db.credito[i];if(Number(x.pago)<Number(x.total))return alert("Ainda existe valor a receber.");let {jsPDF}=window.jspdf,doc=new jsPDF();doc.setFillColor(3,12,24);doc.rect(0,0,210,42,"F");doc.setTextColor(20,140,255);doc.setFont("helvetica","bold");doc.setFontSize(23);doc.text("LANDER iPHONES",105,18,{align:"center"});doc.setTextColor(255,255,255);doc.setFontSize(11);doc.text("COMPROVANTE DE CREDIARIO FINALIZADO",105,29,{align:"center"});doc.setTextColor(20,20,20);doc.setFontSize(12);doc.text(`Cliente: ${x.cliente}`,18,60);doc.text(`CPF: ${x.cpf||"-"}`,18,70);doc.text(`Produto: ${x.item}`,18,80);doc.text(`Valor total: ${money(x.total)}`,18,90);doc.text(`Valor pago: ${money(x.pago)}`,18,100);doc.text(`Acordo: ${x.acordo||"-"}`,18,110);doc.setDrawColor(20,140,255);doc.roundedRect(14,48,182,76,4,4);doc.setFont("helvetica","bold");doc.setTextColor(20,140,255);doc.text("CREDIARIO QUITADO",105,142,{align:"center"});doc.setFont("helvetica","normal");doc.setTextColor(80,80,80);doc.setFontSize(9);doc.text("Documento gerado pelo sistema interno Lander iPhones.",105,282,{align:"center"});let blob=doc.output("blob"),file=new File([blob],`Crediario-${x.cliente.replace(/[^a-z0-9]/gi,"-")}.pdf`,{type:"application/pdf"});if(navigator.canShare&&navigator.canShare({files:[file]})){try{await navigator.share({files:[file],title:"Crediario finalizado - Lander iPhones"});return}catch(e){if(e.name==="AbortError")return}}doc.save(file.name)}

async function readImeiPhoto(e){let f=e.target.files[0];if(!f)return;ocrStatus.textContent="Lendo IMEI pela câmera...";try{let result=await Tesseract.recognize(f,"eng");let text=result.data.text||"",nums=text.match(/\d[\d\s-]{13,20}\d/g)||[],imei=nums.map(x=>x.replace(/\D/g,"")).find(x=>x.length===15);if(imei){osSerial.value=imei;ocrStatus.textContent="IMEI lido: "+imei}else ocrStatus.textContent="Não consegui identificar 15 dígitos. Digite o IMEI manualmente ou tente outra foto mais nítida."}catch(err){ocrStatus.textContent="Falha na leitura automática. Digite o IMEI manualmente."}e.target.value=""}
function compressImage(file,max=1280,quality=.72){return new Promise((resolve,reject)=>{let r=new FileReader();r.onload=()=>{let img=new Image();img.onload=()=>{let scale=Math.min(1,max/Math.max(img.width,img.height)),c=document.createElement("canvas");c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);c.getContext("2d").drawImage(img,0,0,c.width,c.height);resolve(c.toDataURL("image/jpeg",quality))};img.onerror=reject;img.src=r.result};r.onerror=reject;r.readAsDataURL(file)})}
async function loadDevicePhoto(e){let f=e.target.files[0];if(!f)return;try{devicePhotoPreview.src=await compressImage(f);devicePhotoPreview.style.display="block"}catch{alert("Não foi possível carregar a foto.")}e.target.value=""}
let sigCtx=null,sigDrawing=false,sigHasInk=false;
function initSignature(){let c=signatureCanvas,dpr=Math.max(1,window.devicePixelRatio||1),rect=c.getBoundingClientRect();c.width=Math.round(rect.width*dpr);c.height=Math.round(180*dpr);sigCtx=c.getContext("2d");sigCtx.scale(dpr,dpr);sigCtx.lineWidth=2.2;sigCtx.lineCap="round";sigCtx.lineJoin="round";sigCtx.strokeStyle="#000";clearSignature();let pos=e=>{let r=c.getBoundingClientRect(),t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}};c.onpointerdown=e=>{sigDrawing=true;sigHasInk=true;let p=pos(e);sigCtx.beginPath();sigCtx.moveTo(p.x,p.y);c.setPointerCapture?.(e.pointerId)};c.onpointermove=e=>{if(!sigDrawing)return;let p=pos(e);sigCtx.lineTo(p.x,p.y);sigCtx.stroke()};c.onpointerup=c.onpointercancel=()=>sigDrawing=false}
function clearSignature(){if(!sigCtx)return;let c=signatureCanvas,r=c.getBoundingClientRect();sigCtx.save();sigCtx.setTransform(1,0,0,1,0,0);sigCtx.fillStyle="#fff";sigCtx.fillRect(0,0,c.width,c.height);sigCtx.restore();sigHasInk=false}
function loadSignature(src){let img=new Image();img.onload=()=>{let r=signatureCanvas.getBoundingClientRect();sigCtx.drawImage(img,0,0,r.width,180);sigHasInk=true};img.src=src}
function onlyDigits(s){return String(s||"").replace(/\D/g,"")}
async function generateAndSharePDF(i){let x=db.os[i],{jsPDF}=window.jspdf,doc=new jsPDF(),y=18;doc.setFont("helvetica","bold");doc.setFontSize(18);doc.text("LANDER iPHONES - ORDEM DE SERVICO",105,y,{align:"center"});y+=12;doc.setFontSize(10);doc.setFont("helvetica","normal");let lines=[`Data: ${x.data}`,`Cliente: ${x.cliente}`,`CPF: ${x.cpf||"-"}`,`WhatsApp: ${x.telefone||"-"}`,`Endereco: ${x.rua||"-"} - Bairro: ${x.bairro||"-"}`,`Aparelho: ${x.aparelho}`,`IMEI / Serial: ${x.serial||"-"}`,`Defeito relatado: ${x.defeito}`,`Servico: ${x.servico}`,`Pecas: ${(x.pecas||[]).map(p=>p.nome).join(", ")||"Nenhuma"}`,`Valor cobrado: ${money(x.maoObra)}`,`Forma de pagamento: ${x.pagamento||"-"}`,`Status: ${x.status}`,`Garantia: ${x.garantia||"Sem garantia"}`];for(let line of lines){let arr=doc.splitTextToSize(line,180);doc.text(arr,15,y);y+=arr.length*6}if(x.foto){try{y+=3;doc.setFont("helvetica","bold");doc.text("Foto do aparelho / defeito",15,y);y+=4;doc.addImage(x.foto,"JPEG",15,y,75,55);y+=61}catch{}}if(y>235){doc.addPage();y=20}doc.setFont("helvetica","bold");doc.text("Assinatura digital do cliente",15,y);y+=4;if(x.assinatura){try{doc.addImage(x.assinatura,"PNG",15,y,90,38)}catch{}}y+=44;doc.addPage();y=18;doc.setFont("helvetica","bold");doc.setFontSize(13);doc.text("TERMOS E CONDICOES DE GARANTIA",105,y,{align:"center"});y+=10;doc.setFont("helvetica","normal");doc.setFontSize(8.5);let warrantyText=`TERMOS E CONDICOES DE GARANTIA\n\nA Lander iPhones oferece garantia exclusivamente sobre a peca substituida e/ou o servico tecnico descrito nesta Ordem de Servico.\n\nA GARANTIA COBRE: defeito de funcionamento da peca instalada, falha decorrente da instalacao ou montagem, mau contato relacionado ao reparo realizado e retorno do mesmo defeito quando comprovadamente relacionado ao servico executado pela Lander iPhones.\n\nA GARANTIA NAO COBRE: quedas, impactos, pressao ou danos fisicos; telas, vidros ou carcacas quebradas ou trincadas apos a entrega; contato com agua, liquidos ou umidade; oxidacao; mau uso; danos eletricos; danos causados por carregadores, cabos ou acessorios; defeitos em componentes diferentes dos reparados; novos defeitos sem relacao com o servico realizado; ou aparelhos abertos, alterados ou reparados por terceiros apos o atendimento.\n\nTodo atendimento em garantia esta sujeito a avaliacao tecnica da Lander iPhones para identificacao da causa do defeito. A garantia limita-se ao servico e/ou peca descritos nesta O.S., respeitados os direitos do consumidor previstos em lei.\n\nAo assinar esta Ordem de Servico, o cliente declara ter recebido e estar ciente das condicoes de garantia descritas acima.`;let paras=warrantyText.split("\n\n").slice(1);for(let para of paras){let arr=doc.splitTextToSize(para,180);if(y+arr.length*4.5>278){doc.addPage();y=18}doc.text(arr,15,y);y+=arr.length*4.5+5}doc.setFontSize(8);doc.text("Garantia selecionada nesta O.S.: "+(x.garantia||"Sem garantia"),15,282);let blob=doc.output("blob"),file=new File([blob],`OS-${x.cliente.replace(/[^a-z0-9]/gi,"-")}-${x.aparelho.replace(/[^a-z0-9]/gi,"-")}.pdf`,{type:"application/pdf"});try{if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:"Ordem de Servico - Lander iPhones",text:`OS de ${x.cliente} - ${x.aparelho}. Enviar pelo WhatsApp para ${x.telefone}.`});return}}catch(err){if(err.name==="AbortError")return}doc.save(file.name);let tel=onlyDigits(x.telefone);if(tel){if(tel.length<=11)tel="55"+tel;window.open(`https://wa.me/${tel}?text=${encodeURIComponent("Olá "+x.cliente+", segue sua Ordem de Serviço da Lander iPhones. O PDF foi gerado no aparelho.")}`,"_blank")}else alert("PDF gerado. Cadastre o WhatsApp do cliente para abrir a conversa.")}

function renderOS(){if(!document.getElementById("osList"))return;osList.innerHTML=db.os.map((x,i)=>{let pc=(x.pecas||[]).reduce((a,p)=>a+Number(p.custo||0),0);return `<div class="os-card"><h3>${esc(x.cliente)} — ${esc(x.aparelho)}</h3><div class="os-meta"><b>Status:</b> ${esc(x.status)}<br><b>CPF:</b> ${esc(x.cpf||"-")}<br><b>Endereço:</b> ${esc(x.rua||"-")} • ${esc(x.bairro||"-")}<br><b>IMEI / Serial:</b> ${esc(x.serial||"-")}<br><b>Defeito:</b> ${esc(x.defeito)}<br><b>Serviço:</b> ${esc(x.servico)}<br><b>Peças:</b> ${(x.pecas||[]).map(p=>esc(p.nome)).join(", ")||"Nenhuma"}<br><b>Custo das peças:</b> ${money(pc)}<br><b>Pagamento:</b> ${esc(x.pagamento||"Disponível quando ficar Pronto")}</div><div class="os-total">Valor cobrado: ${money(x.maoObra)}</div><div class="os-actions"><button onclick="openOS(${i})">Editar</button><button onclick="finishOS(${i})">${x.lancada?"PDF / WhatsApp":"Finalizar"}</button><button onclick="deleteOS(${i})">Excluir</button></div></div>`}).join("")||'<div class="row">Nenhuma OS cadastrada.</div>'}
