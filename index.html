<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<title>Lander Controle</title>
<style>
:root{--blue:#0788ff;--green:#00d96b;--purple:#8247ff;--silver:#b9c2cf}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
body{background:#000 url("lander-bg.jpeg") center top/100% auto no-repeat}
.hero{height:353px;position:relative}
.menu,.bell{position:absolute;top:36px;width:66px;height:66px;border:1px solid #25384c;border-radius:16px;background:rgba(2,8,14,.88);display:grid;place-items:center;box-shadow:0 6px 20px #000b}
.menu{left:31px}.bell{right:31px}.menu svg,.bell svg{width:31px;height:31px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.bell:after{content:"";position:absolute;right:13px;top:13px;width:9px;height:9px;background:var(--blue);border-radius:50%}
main{width:100%;max-width:710px;margin:auto;padding:0 31px 143px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:15px 17px}
.card{height:181px;position:relative;border:1px solid #30475e;border-radius:20px;background:linear-gradient(145deg,rgba(3,13,22,.97),rgba(1,7,12,.93));box-shadow:0 7px 20px #000b;padding:28px 8px 15px 104px;overflow:hidden}
.card-icon{position:absolute;left:20px;top:31px;width:72px;height:72px;border:2px solid var(--blue);border-radius:50%;display:grid;place-items:center;box-shadow:0 0 10px rgba(7,136,255,.28)}
.card-icon svg{width:43px;height:43px;fill:none;stroke:var(--blue);stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
.card small{display:block;color:#bec5cf;font-size:13px;font-weight:650;text-transform:uppercase;white-space:nowrap;line-height:1.1;margin-top:7px;letter-spacing:-.45px;width:100%;max-width:none;overflow:visible;text-overflow:unset}
.money{font-size:29px;font-weight:850;margin-top:13px;white-space:nowrap;letter-spacing:-.6px}
.spark{position:absolute;left:20px;right:20px;bottom:18px;height:42px}
.spark svg{width:100%;height:100%;overflow:visible}.spark polyline{fill:none;stroke:var(--blue);stroke-width:1.8;filter:drop-shadow(0 0 3px var(--blue))}
.card.green .card-icon{border-color:var(--green);box-shadow:0 0 10px rgba(0,217,107,.34)}.card.green .card-icon svg{stroke:var(--green)}.card.green .spark polyline{stroke:var(--green);filter:drop-shadow(0 0 3px var(--green))}
.card.purple .card-icon{border-color:var(--purple);box-shadow:0 0 10px rgba(130,71,255,.38)}.card.purple .card-icon svg{stroke:var(--purple)}.card.purple .spark polyline{stroke:var(--purple);filter:drop-shadow(0 0 3px var(--purple))}
.quick{margin-top:95px}.quick h2{font-size:24px;margin:0 0 20px;text-transform:uppercase}.quick h2:before{content:"◢";color:var(--blue);font-size:21px;margin-right:9px}
.action{width:100%;height:108px;margin:0 0 15px;position:relative;display:flex;align-items:center;padding:0 65px 0 125px;border:1px solid #126bb8;border-radius:18px;background:linear-gradient(145deg,rgba(2,12,21,.98),rgba(1,7,12,.95));color:#fff;text-align:left;box-shadow:0 7px 20px #000a}
.plus{position:absolute;left:27px;top:19px;width:68px;height:68px;border:2px solid var(--blue);border-radius:50%;display:grid;place-items:center;color:var(--blue);font-size:43px;font-weight:300;box-shadow:0 0 10px rgba(7,136,255,.25)}
.copy{display:flex;flex-direction:column;gap:10px;font-size:20px;font-weight:800;line-height:1}.copy small{font-size:14px;font-weight:450;color:#aeb8c6}.chev{position:absolute;right:31px;top:50%;transform:translateY(-54%);font-size:55px;font-weight:250;color:#aeb8c6}
.view{display:none}.view.active{display:block}
.list-title{margin:28px 0 14px;font-size:24px}.row{display:flex;align-items:center;justify-content:space-between;background:rgba(2,10,18,.94);border:1px solid #315f85;padding:18px;border-radius:18px;margin:10px 0;gap:10px}.row b{display:block}.row small{color:#aeb8c6}.right{text-align:right}.pill{font-size:11px;padding:5px 8px;border-radius:999px;background:#17314e;color:#a9d4ff}
input,select{width:100%;background:#06111d;border:1px solid #29445f;color:white;border-radius:12px;padding:13px;margin:5px 0 10px;font-size:16px}label{font-size:12px;color:#aeb8c6}
dialog{width:min(92%,520px);border:1px solid #2b6ca5;border-radius:20px;background:#07111f;color:white;padding:18px}dialog::backdrop{background:#000b}.actions{display:flex;gap:8px;margin-top:8px}.actions button{flex:1;padding:12px;border:0;border-radius:11px;font-weight:800}.secondary{background:#26384b;color:white}.save{background:var(--blue);color:#fff}
nav{position:fixed;left:22px;right:22px;bottom:14px;z-index:20;height:116px;display:grid;grid-template-columns:repeat(5,1fr);padding:17px 5px calc(10px + env(safe-area-inset-bottom));background:rgba(2,9,16,.97);border:1px solid #405367;border-radius:29px;box-shadow:0 12px 34px #000}
nav button{background:none;border:0;color:#9da8b7;font-size:12px;padding:3px 1px}.nav-icon{display:block;width:32px;height:32px;margin:0 auto 8px}.nav-icon svg{width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.product-add{height:92px;margin-bottom:16px}.product-add .plus{width:56px;height:56px;top:17px;font-size:36px}.product-add .copy{font-size:17px}
.product-right{text-align:right;min-width:92px}.product-actions{display:flex;justify-content:flex-end;gap:7px;margin-top:8px}.product-actions button{width:34px;height:30px;border:1px solid #315f85;border-radius:9px;background:#071522;color:#9dcbff;font-size:18px}
nav button.active{color:var(--blue);font-weight:800}nav button.active.home .nav-icon svg{fill:var(--blue);stroke:var(--blue)}
@media(max-width:430px){
.hero{height:353px}main{padding-left:18px;padding-right:18px}.menu{left:18px}.bell{right:18px}
.grid{gap:10px}.card{height:181px;padding:27px 5px 15px 86px;border-radius:19px}.card-icon{left:16px;top:31px;width:64px;height:64px}.card-icon svg{width:39px;height:39px}.card small{font-size:9.7px;letter-spacing:-.55px}.money{font-size:24px;margin-top:12px}.spark{left:16px;right:16px}
.quick{margin-top:88px}.quick h2{font-size:21px}.action{height:108px;padding-left:105px;padding-right:50px}.plus{left:20px;width:64px;height:64px;top:21px}.copy{font-size:16px}.copy small{font-size:12px}.chev{right:22px}nav{left:14px;right:14px;height:112px}
}

.card:nth-child(1) small{font-size:12px}
.card:nth-child(2) small{font-size:11.2px}
.card:nth-child(3) small{font-size:10.8px}
.card:nth-child(4) small{font-size:11.7px}
.card:nth-child(5) small{font-size:12px}
@media(max-width:430px){
.card:nth-child(1) small{font-size:9.2px}
.card:nth-child(2) small{font-size:8.5px}
.card:nth-child(3) small{font-size:8.15px}
.card:nth-child(4) small{font-size:8.8px}
.card:nth-child(5) small{font-size:9.3px}
}


/* V4 — geometria travada na referência 710 × 1536 */
@media (min-width:431px){
  main{width:710px;max-width:710px;padding-left:31px;padding-right:31px}
  .hero{width:710px;height:353px;margin:0 auto}
  .grid{grid-template-columns:315px 315px;column-gap:17px;row-gap:15px}
  .card{width:315px;height:181px;border-radius:20px;padding:28px 8px 15px 111px}
  .card-icon{left:20px;top:31px;width:72px;height:72px}
  .card-icon svg{width:43px;height:43px}
  .card small{font-size:15px;letter-spacing:-.35px}
  .card:nth-child(1) small{font-size:15px}
  .card:nth-child(2) small{font-size:14.3px}
  .card:nth-child(3) small{font-size:13.2px}
  .card:nth-child(4) small{font-size:14.6px}
  .card:nth-child(5) small{font-size:15px}
  .money{font-size:29px;margin-top:13px}
  .spark{left:20px;right:20px;bottom:18px;height:42px}
  .quick{margin-top:95px}
  .quick h2{font-size:24px;margin-bottom:20px}
  .action{width:648px;height:108px;border-radius:18px;margin-bottom:15px;padding-left:125px;padding-right:65px}
  .plus{left:27px;top:19px;width:68px;height:68px}
  .copy{font-size:20px}.copy small{font-size:14px}
  nav{width:666px;left:50%;right:auto;transform:translateX(-50%);height:116px;bottom:14px;border-radius:29px}
}
@media (max-width:430px){
  body{background-size:100% auto;background-position:center top}
  .hero{height:214px}
  main{padding:0 15px 126px}
  .grid{grid-template-columns:calc((100vw - 40px)/2) calc((100vw - 40px)/2);gap:9px 10px}
  .card{width:calc((100vw - 40px)/2);height:111px;border-radius:13px;padding:17px 4px 9px 70px}
  .card-icon{left:12px;top:19px;width:45px;height:45px}
  .card-icon svg{width:27px;height:27px}
  .card small{margin-top:4px;line-height:1.05;letter-spacing:-.35px}
  .card:nth-child(1) small{font-size:8.6px}
  .card:nth-child(2) small{font-size:8.1px}
  .card:nth-child(3) small{font-size:7.5px}
  .card:nth-child(4) small{font-size:8.2px}
  .card:nth-child(5) small{font-size:8.7px}
  .money{font-size:16.5px;margin-top:8px;letter-spacing:-.35px}
  .spark{left:12px;right:12px;bottom:10px;height:26px}
  .quick{margin-top:57px}
  .quick h2{font-size:15px;margin-bottom:12px}
  .quick h2:before{font-size:13px;margin-right:6px}
  .action{height:66px;border-radius:12px;margin-bottom:10px;padding:0 42px 0 77px}
  .plus{left:17px;top:12px;width:42px;height:42px;font-size:28px}
  .copy{font-size:12.5px;gap:6px}.copy small{font-size:8.5px}
  .chev{right:19px;font-size:35px}
  nav{left:14px;right:14px;bottom:9px;height:76px;border-radius:19px;padding:10px 3px calc(6px + env(safe-area-inset-bottom))}
  nav button{font-size:8px}
  .nav-icon{width:21px;height:21px;margin-bottom:5px}
}

</style>
</head>
<body>
<div class="hero">
<div class="menu"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></div>
<div class="bell"><svg viewBox="0 0 24 24"><path d="M6 9a6 6 0 0 1 12 0v5l2 3H4l2-3z"/><path d="M10 20h4"/></svg></div>
</div>
<main>
<section id="inicio" class="view active">
<div class="grid">
<div class="card"><span class="card-icon"><svg viewBox="0 0 24 24"><path d="M2.5 4h2.5l2.2 10.2h10.2l2.2-7.2H6"/><path d="M8 10h10M10 7v7M15 7v7"/><circle cx="9" cy="18.5" r="1.5"/><circle cx="17" cy="18.5" r="1.5"/></svg></span><small>Gastos da loja</small><div class="money" id="gastosTotal"></div><div class="spark"><svg viewBox="0 0 280 42"><polyline points="0,34 27,27 51,31 77,15 102,27 130,22 157,31 187,20 214,23 243,13 280,9"/></svg></div></div>
<div class="card"><span class="card-icon"><svg viewBox="0 0 24 24"><path d="M12 2v10M15 5c0-1.5-1.4-2.5-3-2.5S9 3.5 9 5s1.4 2.3 3 2.3 3 .9 3 2.4-1.4 2.4-3 2.4"/><path d="M3 16h4l2-2h5.5c1.3 0 2.2.8 2.2 1.9 0 .6-.3 1.1-.8 1.5H12"/><path d="M3 16v5h4l3-1h6l5-4c.8-.6.8-1.7.2-2.3-.5-.5-1.4-.6-2-.2l-3.2 2"/></svg></span><small>Crediário a receber</small><div class="money" id="crediarioTotal"></div><div class="spark"><svg viewBox="0 0 280 42"><polyline points="0,34 27,27 51,31 77,15 102,27 130,22 157,31 187,20 214,23 243,13 280,9"/></svg></div></div>
<div class="card"><span class="card-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M4 22c0-5.2 3-8.2 8-8.2s8 3 8 8.2"/></svg></span><small>Dívida pessoal à loja</small><div class="money" id="dividaTotal"></div><div class="spark"><svg viewBox="0 0 280 42"><polyline points="0,34 27,27 51,31 77,15 102,27 130,22 157,31 187,20 214,23 243,13 280,9"/></svg></div></div>
<div class="card green"><span class="card-icon"><svg viewBox="0 0 24 24"><path d="M4 20v-5h4v5M10 20v-8h4v8M16 20V8h4v12"/><path d="M3 11l6-5 4 3 8-7"/><path d="M17 2h4v4"/></svg></span><small>Lucro Anderson</small><div class="money" id="lucroA"></div><div class="spark"><svg viewBox="0 0 280 42"><polyline points="0,34 27,27 51,31 77,15 102,27 130,22 157,31 187,20 214,23 243,13 280,9"/></svg></div></div>
<div class="card purple"><span class="card-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="7" r="4"/><path d="M4 22c0-5.2 3-8.2 8-8.2s8 3 8 8.2"/></svg></span><small>Lucro Ryan</small><div class="money" id="lucroR"></div><div class="spark"><svg viewBox="0 0 280 42"><polyline points="0,34 27,27 51,31 77,15 102,27 130,22 157,31 187,20 214,23 243,13 280,9"/></svg></div></div>
</div>
<div class="quick"><h2>Ações rápidas</h2>
<button class="action" onclick="openModal('gasto')"><span class="plus">＋</span><span class="copy">NOVO GASTO<small>Registrar uma nova despesa</small></span><span class="chev">›</span></button>
<button class="action" onclick="openModal('servico')"><span class="plus">＋</span><span class="copy">NOVO SERVIÇO OU PRODUTO<small>Adicionar serviço ou produto</small></span><span class="chev">›</span></button>
</div>
</section>
<section id="gastos" class="view"><h2 class="list-title">Gastos da loja</h2><div id="gastosList"></div></section>
<section id="credito" class="view"><h2 class="list-title">Crediário em aberto</h2><div id="creditoList"></div></section>
<section id="pecas" class="view">
<h2 class="list-title">Peças e telas</h2>
<button class="action product-add" onclick="openProductModal()"><span class="plus">＋</span><span class="copy">ADICIONAR PRODUTO<small>Cadastrar uma nova peça ou tela</small></span><span class="chev">›</span></button>
<input id="busca" placeholder="Buscar modelo, categoria ou tela..." oninput="renderPecas()">
<div id="pecasList"></div>
</section>
<section id="socios" class="view"><h2 class="list-title">Sócios</h2><div id="sociosList"></div></section>
</main>
<nav>
<button class="active home" onclick="show('inicio',this)"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8v10h-6v-6H9v6H3z"/></svg></span>INÍCIO</button>
<button onclick="show('gastos',this)"><span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M15 8c0-1.5-1.5-2.5-3-2.5S9 6.5 9 8s1.5 2.2 3 2.5 3 1 3 2.5-1.5 2.5-3 2.5S9 14.5 9 13M12 4v16"/></svg></span>GASTOS</button>
<button onclick="show('credito',this)"><span class="nav-icon"><svg viewBox="0 0 24 24"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8" cy="10" r="2"/><path d="M5 16c1-2 5-2 6 0M14 9h4M14 13h4"/></svg></span>CREDIÁRIO</button>
<button onclick="show('pecas',this)"><span class="nav-icon"><svg viewBox="0 0 24 24"><path d="M3 7l9-4 9 4-9 4zM3 7v10l9 4 9-4V7M12 11v10"/></svg></span>PEÇAS</button>
<button onclick="show('socios',this)"><span class="nav-icon"><svg viewBox="0 0 24 24"><circle cx="8" cy="8" r="3"/><circle cx="17" cy="8" r="3"/><path d="M2 20c0-4 2-7 6-7s6 3 6 7M12 20c0-3 2-6 5-6s5 3 5 6"/></svg></span>SÓCIOS</button>
</nav>
<dialog id="modal"><form method="dialog" id="form"><h2 id="modalTitle"></h2><div id="fields"></div><div class="actions"><button class="secondary" value="cancel">Cancelar</button><button class="save" value="default" onclick="saveEntry(event)">Salvar</button></div></form></dialog>
<dialog id="productModal">
<form method="dialog" id="productForm">
<h2 id="productModalTitle">Adicionar produto</h2>
<label>Nome do produto</label><input id="pNome" required>
<label>Categoria</label><input id="pCat" placeholder="Ex.: COMUM, OLED, SOFT OLED, FHD" required>
<label>Valor</label><input id="pValor" type="number" step=".01" required>
<label>Fornecedor</label><input id="pFornecedor" value="Mastter Peças">
<div class="actions"><button class="secondary" value="cancel">Cancelar</button><button class="save" value="default" onclick="saveProduct(event)">Salvar</button></div>
</form>
</dialog>
